<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./style/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <figure>
      <img class="display_mobile" src="./images/image-product-mobile.jpg" alt="A picture of a bottle of Gabrielle Essence to Chanel From Paris">
      <img class="display_desktop" src="./images/image-product-desktop.jpg" alt="A picture of a bottle of Gabrielle Essence to Chanel From Paris">
    </figure>
    <section>
      <header class="montserrat text-preset4">
        Perfume
      </header>
      <h1 class="titre fraunces text-preset1">Gabrielle Essence Eau De Parfum</h1>
      <p class="description montserrat text-preset3">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>
      <p class="price"><span class="sell-price fraunces text-preset1">$149.99</span><span class="sold-price montserrat text-preset5">$169.99</span></p>
      <button class="montserrat text-preset2">
        <img src="./images/icon-cart.svg" alt="#">
        Add to Cart
      </button>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
