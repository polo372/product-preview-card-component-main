<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<figure>
  <img src="./images/image-product-desktop.jpg" alt="A picture of a bottle of Gabrielle Essence to Chanel From Paris">
  <img src="./images/image-product-mobile.jpg" alt="A picture of a bottle of Gabrielle Essence to Chanel From Paris">
</figure>
<main>
  <header>
    Perfume
  </header>
  <article>
    <h1>Gabrielle Essence Eau De Parfum</h1>
    <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.</p>
  </article>
  <p><span>$149.99</span><span>$169.99</span></p>
  <button>
    <img src="./images/icon-cart.svg" alt="#">
    Add to Cart
  </button>
</main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
